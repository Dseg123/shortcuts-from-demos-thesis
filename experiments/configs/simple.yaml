dataset:
  path: null
  obs_keys:
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qpos
    - object

env:
  eps: 0.5
  max_lookup_pairs: 5000
  camera_name: agentview
  render_height: 256
  render_width: 256

learning_system:
  # Architecture
  latent_dim: 64
  obs_enc_dim: 128
  action_embed_dim: 16
  hidden_dims: [128, 128]
  actor_hidden_dims: [128, 128]
  normalize_embeddings: true

  # Optimiser
  critic_lr: 1e-4
  actor_lr: 1e-4
  grad_clip: 1.0

  # CRTR sampling
  batch_size: 64
  repetition_factor: 4
  gamma: 0.99

  # Actor loss weights
  crl_weight: 0
  bc_weight: 1
  entropy_weight: 0

  # Device
  device: cuda

  # Training loop
  num_steps: 10000
  log_every: 500

eval:
  num_rollouts: 20
  max_steps: 200

perceiver:
  K: 9
  max_obs: 10000
  num_rollouts: 10
  max_steps: 200
  success_threshold: 0.5
online_system:
  batch_size: 64
  repetition_factor: 4
  gamma: 0.99
  crl_weight: 1.0
  entropy_weight: 0.01
  critic_lr: 3e-4
  actor_lr: 1e-4
  grad_clip: 1.0
  max_steps: 200
  collect_per_step: 4
  buffer_size: 10000
  dist_scale: 1.0
  auto_dist_scale: true
  dist_quantile: 1.0
  gain_samples: 50
  edge_window_size: 10
  edge_success_threshold: 0.8
  sampling_method: stochastic_ucb
  ucb_beta: 1.0
  gain_update_frequency: 10
  residualize: false
  num_steps: 10000
  log_every: 100
  device: cuda

online_eval:
  render: true
  num_rollouts: 20
  max_edge_steps: 200
  replay_mode: live
  rollout_method: retries
  max_retries: 10
  eval_every: 500

offline_dir: ???
resume: false
